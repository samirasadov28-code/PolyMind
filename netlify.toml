[build]
  publish = "."
  functions = "netlify/functions"

# Proxy Polymarket Gamma API to avoid CORS issues
[[redirects]]
  from = "/api/polymarket/*"
  to = "https://gamma-api.polymarket.com/:splat"
  status = 200
  force = true
  headers = {Accept = "application/json"}

# AI proxy — routes to the serverless function
[[redirects]]
  from = "/api/ai"
  to = "/.netlify/functions/ai-proxy"
  status = 200
  force = true

# Pro activation — validates redemption codes
[[redirects]]
  from = "/api/activate"
  to = "/.netlify/functions/activate"
  status = 200
  force = true

# Stripe webhook — issues codes on checkout.session.completed
[[redirects]]
  from = "/api/stripe-webhook"
  to = "/.netlify/functions/stripe-webhook"
  status = 200
  force = true

# Fetch activation code issued for a Stripe session (success-page redirect)
[[redirects]]
  from = "/api/activation-code"
  to = "/.netlify/functions/activation-code"
  status = 200
  force = true

# SPA fallback — serve index.html for any non-file route
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security & caching headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
